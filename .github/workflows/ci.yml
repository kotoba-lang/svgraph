name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build browser TypeScript
        run: |
          npm run check:web
          npm run build:web
          git diff --exit-code docs/app.js

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -q

      - name: Run analyzer fixtures
        run: |
          svgraph analyze examples/sample.svg
          svgraph analyze examples/complex.svg
          svgraph analyze examples/coverage.svg
          python - <<'PY'
          from pathlib import Path

          from svgraph import analyze_svg

          coverage = analyze_svg(Path("examples/coverage.svg").read_text(encoding="utf-8"))
          assert coverage.estimated_element_coverage == 1.0, coverage
          assert coverage.unsupported_elements == {}, coverage
          assert coverage.unsupported_attributes == {}, coverage
          assert coverage.unsupported_path_commands == {}, coverage
          assert coverage.ignored_elements == 18, coverage

          complex_report = analyze_svg(Path("examples/complex.svg").read_text(encoding="utf-8"))
          assert complex_report.estimated_element_coverage == 1.0, complex_report
          assert complex_report.unsupported_elements == {}, complex_report
          assert complex_report.unsupported_path_commands == {}, complex_report
          assert complex_report.unsupported_attributes == {
              "mix-blend-mode": 1,
              "rotate": 1,
          }, complex_report
          PY

      - name: Build PPTX smoke fixture
        run: |
          python examples/make_pptx.py examples/coverage.svg -o tmp/svgraph-ci-coverage.pptx
          python -m zipfile --test tmp/svgraph-ci-coverage.pptx
          python - <<'PY'
          import zipfile

          with zipfile.ZipFile("tmp/svgraph-ci-coverage.pptx") as pptx:
              slide = pptx.read("ppt/slides/slide1.xml").decode("utf-8")
              rels = pptx.read("ppt/slides/_rels/slide1.xml.rels").decode("utf-8")
              names = set(pptx.namelist())

          assert "<p:pic>" in slide, "embedded image was not converted to a picture"
          assert 'x="6290310"' in slide and 'cy="293370"' in slide, "image clip-path was not reflected in picture geometry"
          assert 'flipV="1"' in slide, "reflected image transform was not preserved as a picture flip"
          assert '<a:alphaModFix amt="65000"' in slide, "image opacity was not written to DrawingML"
          assert "<a:headEnd type=\"triangle\"" in slide, "line marker was not converted to a DrawingML arrow"
          assert "<a:tailEnd type=\"triangle\"" in slide, "marker shorthand was not converted to a DrawingML start arrow"
          assert "<a:custDash>" in slide, "non-zero custom dash was not written"
          assert '<a:ln w="14288"' in slide, "transformed text outline width was not scaled"
          assert 'x="266700"' in slide and 'val="BFDBFE"' in slide, "CSS transform property was not applied to fixture geometry"
          assert 'x="1752600" y="914400"' not in slide, "transparent blend-only fixture should not produce a visible shape"
          assert 'val="DCFCE7"' in slide, "visible descendant inside hidden group was not rendered"
          assert 'rot="600000"' in slide and 'val="E9D5FF"' in slide, "absolute transform-origin was not applied to CSS transform"
          assert slide.count('x="2743200" y="2324100"') >= 2, "two-point path/polyline clip geometry was not reflected in DrawingML"
          assert 'cx="381000" cy="381000"' in slide and 'x="381000" y="0"' in slide, "clipped two-point path/polyline endpoints were not written"
          assert 'val="ECFCCB"' in slide and 'val="123ABC"' not in slide, "switch fallback branch was not selected"
          assert 'val="CCFBF1"' in slide and 'cx="1219200" cy="685800"' in slide, "nested svg preserveAspectRatio=none was not reflected"
          assert 'val="FEE2E2"' in slide and 'x="5638800" y="2781300"' in slide and 'cx="1371600" cy="685800"' in slide, "nested svg slice alignment was not reflected"
          assert 'val="FEF9C3"' in slide and 'val="A16207"' in slide, "inherited fill/stroke paint was not applied"
          assert slide.count('val="FEF9C3"') >= 2 and slide.count('val="A16207"') >= 2, "context-fill/context-stroke paint was not applied"
          assert slide.count('val="2563EB"') >= 2, "symbol use currentColor paint was not expanded"
          assert '<a:ln w="125672"' in slide, "percentage stroke width was not resolved against the viewport diagonal"
          assert 'd="989545" sp="659695"' in slide and 'd="329850" sp="0"' in slide, "percentage dasharray was not resolved against the viewport diagonal"
          assert 'd="0" sp="100000"' in slide and 'd="400000" sp="100000"' in slide, "gap dashoffset was not approximated with a leading gap"
          assert 'cap="rnd"' in slide and '<a:miter lim="400000"' in slide, "stroke linecap/miter-clip linejoin values were not normalized"
          assert 'rot="5400000"' in slide, "text rotate angle units were not resolved"
          assert 'anchor="ctr"' in slide and '<a:pPr algn="ctr"' in slide, "text anchor/baseline values were not normalized"
          assert "<a:ds d=\"0\" sp=\"0\"" not in slide, "zero dasharray should remain a solid line"
          assert "cap=\"all\"" in slide, "all-small-caps text was not preserved"
          assert "u=\"sng\"" in slide, "text-decoration-line underline was not written to DrawingML"
          assert "u=\"wavy\"" in slide, "wavy underline style was not written to DrawingML"
          assert "spc=\"" in slide, "text spacing adjustments were not written"
          assert 'baseline="30000"' in slide, "text baseline-shift super was not written to DrawingML"
          assert 'baseline="-25000"' in slide, "tspan baseline-shift sub was not written to DrawingML"
          assert 'val="DC2626"' in slide and 'alpha val="85000"' in slide, "tspan fill color/opacity was not written to DrawingML"
          assert "<a:t>tspan anchor</a:t>" in slide, "first-positioned tspan text-anchor fallback was not converted"
          assert "<a:t>WORD GAP</a:t>" in slide, "text-transform uppercase was not applied"
          assert "<a:t>FIXTURE</a:t>" in slide, "tspan text-transform uppercase was not applied"
          assert "<a:t>MiXeD</a:t>" in slide, "normal text-transform should preserve literal text"
          assert 'typeface="A,B Display"' in slide, "quoted comma font family was not preserved"
          assert 'b="1"' in slide and 'i="1"', "font style values were not normalized"
          assert "hidden-filter" not in slide and "R10 20" not in slide, "normalized hidden display should skip hidden unsupported path"
          assert "Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/image\"" in rels
          assert any(name.startswith("ppt/media/image") for name in names), "PPTX media image was not embedded"
          PY

          python examples/make_pptx.py examples/complex.svg -o tmp/svgraph-ci-complex.pptx
          python -m zipfile --test tmp/svgraph-ci-complex.pptx
          python - <<'PY'
          import zipfile

          with zipfile.ZipFile("tmp/svgraph-ci-complex.pptx") as pptx:
              slide = pptx.read("ppt/slides/slide1.xml").decode("utf-8")
              rels = pptx.read("ppt/slides/_rels/slide1.xml.rels").decode("utf-8")
              names = set(pptx.namelist())

          assert slide.count("<p:sp>") >= 16, "complex SVG did not produce the expected editable shape surface"
          assert "<p:pic>" in slide and '<a:alphaModFix amt="72000"' in slide, "complex embedded image was not converted with opacity"
          assert 'val="F8FAFC"' in slide and 'val="DBEAFE"' in slide and 'val="DCFCE7"' in slide, "complex base shapes were not converted"
          assert 'val="FEF3C7"' in slide and 'val="E0F2FE"' in slide, "complex ellipse/freeform shapes were not converted"
          assert 'val="F0ABFC"' in slide and 'val="86198F"' in slide, "complex use reference was not expanded"
          assert '<a:alpha val="55000"' in slide, "complex reused opacity was not preserved"
          assert 'val="8A7443"' in slide and 'val="991B1B"' in slide, "complex pattern fallback colors were not emitted"
          assert 'val="E0E7FF"' in slide and 'val="4338CA"' in slide, "complex gradient fallback shape was not emitted"
          assert 'val="BE123C"' in slide, "complex transformed dashed line was not emitted"
          assert 'cap="all"' in slide and 'spc="' in slide, "complex text variant and spacing were not preserved"
          assert "<a:t>Text</a:t>" in slide and "<a:t>converts</a:t>" in slide, "complex tspan text was not extracted"
          assert 'Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image"' in rels
          assert any(name.startswith("ppt/media/image") for name in names), "complex PPTX media image was not embedded"
          PY

          svgraph svg2pptx examples/svgraph.svg -o tmp/svgraph-ci-presentation.pptx
          python -m zipfile --test tmp/svgraph-ci-presentation.pptx
          python - <<'PY'
          import zipfile

          with zipfile.ZipFile("tmp/svgraph-ci-presentation.pptx") as pptx:
              names = set(pptx.namelist())
              presentation = pptx.read("ppt/presentation.xml").decode("utf-8")
              app = pptx.read("docProps/app.xml").decode("utf-8")
              slide1 = pptx.read("ppt/slides/slide1.xml").decode("utf-8")
              slide2 = pptx.read("ppt/slides/slide2.xml").decode("utf-8")

          assert {"ppt/slides/slide1.xml", "ppt/slides/slide2.xml"} <= names
          assert presentation.count("<p:sldId ") == 2
          assert 'cx="12192000" cy="6858000"' in presentation
          assert "<Slides>2</Slides>" in app
          assert "<a:t>SVGraph</a:t>" in slide1
          assert "<a:t>Table semantics stay in SVGraph</a:t>" in slide2
          PY

      - name: Build distribution smoke
        run: |
          find src -maxdepth 1 -name "*.egg-info" -exec rm -rf {} +
          rm -rf build tmp/dist
          python -m build --sdist --wheel -o tmp/dist
          test -f tmp/dist/svgraph-*.tar.gz
          test -f tmp/dist/svgraph-*.whl
          python - <<'PY'
          import glob
          import json
          import tarfile
          import tomllib
          import zipfile

          wheel_path = glob.glob("tmp/dist/svgraph-*.whl")[0]
          sdist_path = glob.glob("tmp/dist/svgraph-*.tar.gz")[0]
          with zipfile.ZipFile(wheel_path) as wheel:
              wheel_names = set(wheel.namelist())
              metadata_name = next(name for name in wheel_names if name.endswith(".dist-info/METADATA"))
              entry_points_name = next(name for name in wheel_names if name.endswith(".dist-info/entry_points.txt"))
              top_level_name = next(name for name in wheel_names if name.endswith(".dist-info/top_level.txt"))
              wheel_metadata = wheel.read(metadata_name).decode("utf-8")
              entry_points = wheel.read(entry_points_name).decode("utf-8")
              top_level = set(wheel.read(top_level_name).decode("utf-8").splitlines())
          for expected in [
              "drawingml_svg/__init__.py",
              "drawingml_svg/cli.py",
              "drawingml_svg/converter.py",
              "drawingml_svg/coverage.py",
              "drawingml_svg/ir.py",
              "drawingml_svg/pptx.py",
              "drawingml_svg/py.typed",
              "drawingml_svg/svgraph.py",
              "svgraph/__init__.py",
              "svgraph/__main__.py",
              "svgraph/cli.py",
              "svgraph/converter.py",
              "svgraph/coverage.py",
              "svgraph/model.py",
              "svgraph/pptx.py",
              "svgraph/py.typed",
          ]:
              assert expected in wheel_names
          assert "Name: svgraph" in wheel_metadata
          assert "Summary: Small, dependency-free SVG presentation graph toolkit for SVGraph, DrawingML, PresentationML/PPTX, and browser-only web editing." in wheel_metadata
          assert "Keywords: drawingml,svg,svgraph,presentationml,ooxml,pptx,web,converter" in wheel_metadata
          assert "License-Expression: MIT" in wheel_metadata
          assert "License-File: LICENSE" in wheel_metadata
          assert "Project-URL: Homepage, https://github.com/com-junkawasaki/svgraph" in wheel_metadata
          assert "Project-URL: Repository, https://github.com/com-junkawasaki/svgraph" in wheel_metadata
          assert "Project-URL: Documentation, https://com-junkawasaki.github.io/svgraph/" in wheel_metadata
          assert "Project-URL: Issues, https://github.com/com-junkawasaki/svgraph/issues" in wheel_metadata
          assert "svgraph = svgraph.cli:main" in entry_points
          assert "drawingml-svg = svgraph.cli:main" in entry_points
          assert {"svgraph", "drawingml_svg"} <= top_level

          with tarfile.open(sdist_path) as sdist:
              sdist_names = set(sdist.getnames())
              root = next(name for name in sdist_names if name.endswith("/pyproject.toml")).rsplit("/", 1)[0]
              pyproject = tomllib.loads(sdist.extractfile(f"{root}/pyproject.toml").read().decode("utf-8"))
              web_package = json.loads(sdist.extractfile(f"{root}/package.json").read().decode("utf-8"))
              web_lock = json.loads(sdist.extractfile(f"{root}/package-lock.json").read().decode("utf-8"))
          assert pyproject["project"]["name"] == "svgraph"
          assert pyproject["project"]["description"] == "Small, dependency-free SVG presentation graph toolkit for SVGraph, DrawingML, PresentationML/PPTX, and browser-only web editing."
          assert {"svg", "svgraph", "drawingml", "presentationml", "pptx", "web"} <= set(pyproject["project"]["keywords"])
          assert pyproject["project"]["urls"] == {
              "Homepage": "https://github.com/com-junkawasaki/svgraph",
              "Repository": "https://github.com/com-junkawasaki/svgraph",
              "Documentation": "https://com-junkawasaki.github.io/svgraph/",
              "Issues": "https://github.com/com-junkawasaki/svgraph/issues",
          }
          assert web_package["name"] == "svgraph-web"
          assert web_package["version"] == pyproject["project"]["version"]
          assert web_package["description"] == "Browser-only SVGraph editor and SVG to PresentationML/PPTX converter."
          assert {"svg", "svgraph", "presentationml", "pptx", "web"} <= set(web_package["keywords"])
          assert web_package["homepage"] == "https://com-junkawasaki.github.io/svgraph/"
          assert web_package["private"] is True
          assert web_package["license"] == "MIT"
          assert web_lock["name"] == web_package["name"]
          assert web_lock["version"] == web_package["version"]
          assert web_lock["packages"][""]["name"] == web_package["name"]
          assert web_lock["packages"][""]["version"] == web_package["version"]
          assert web_lock["packages"][""]["license"] == web_package["license"]
          assert f"{root}/README.md" in sdist_names
          assert f"{root}/LICENSE" in sdist_names
          assert f"{root}/CODE_OF_CONDUCT.md" in sdist_names
          assert f"{root}/CHANGELOG.md" in sdist_names
          assert f"{root}/CONTRIBUTING.md" in sdist_names
          assert f"{root}/MIGRATION.md" in sdist_names
          assert f"{root}/RELEASE.md" in sdist_names
          assert f"{root}/SECURITY.md" in sdist_names
          assert f"{root}/package.json" in sdist_names
          assert f"{root}/package-lock.json" in sdist_names
          assert f"{root}/tsconfig.web.json" in sdist_names
          assert f"{root}/docs/.nojekyll" in sdist_names
          assert f"{root}/docs/adr/0001-svgraph.md" in sdist_names
          assert f"{root}/docs/app.js" in sdist_names
          assert f"{root}/docs/index.html" in sdist_names
          assert f"{root}/docs/svgraph-web-editor.md" in sdist_names
          assert f"{root}/examples/__init__.py" in sdist_names
          assert f"{root}/examples/complex.svg" in sdist_names
          assert f"{root}/examples/coverage.svg" in sdist_names
          assert f"{root}/examples/make_pptx.py" in sdist_names
          assert f"{root}/examples/sample.svg" in sdist_names
          assert f"{root}/examples/svgraph.svg" in sdist_names
          assert f"{root}/web/app.ts" in sdist_names
          for expected in [
              "src/drawingml_svg/__init__.py",
              "src/drawingml_svg/cli.py",
              "src/drawingml_svg/converter.py",
              "src/drawingml_svg/coverage.py",
              "src/drawingml_svg/ir.py",
              "src/drawingml_svg/pptx.py",
              "src/drawingml_svg/py.typed",
              "src/drawingml_svg/svgraph.py",
              "src/svgraph/__init__.py",
              "src/svgraph/__main__.py",
              "src/svgraph/cli.py",
              "src/svgraph/converter.py",
              "src/svgraph/coverage.py",
              "src/svgraph/model.py",
              "src/svgraph/pptx.py",
              "src/svgraph/py.typed",
          ]:
              assert f"{root}/{expected}" in sdist_names
          PY
          python -m venv tmp/wheel-venv
          tmp/wheel-venv/bin/python -m pip install tmp/dist/svgraph-*.whl
          expected_version="svgraph $(tmp/wheel-venv/bin/python - <<'PY'
          from importlib.metadata import version

          print(version("svgraph"))
          PY
          )"
          for command in \
            "tmp/wheel-venv/bin/python -m svgraph" \
            "tmp/wheel-venv/bin/svgraph" \
            "tmp/wheel-venv/bin/drawingml-svg" \
            "tmp/wheel-venv/bin/svg2dml" \
            "tmp/wheel-venv/bin/svg2pptx" \
            "tmp/wheel-venv/bin/dml2svg" \
            "tmp/wheel-venv/bin/drawingml-svg-analyze"
          do
            actual_version="$($command --version)"
            test "$actual_version" = "$expected_version"
          done
          tmp/wheel-venv/bin/svgraph analyze examples/coverage.svg
          tmp/wheel-venv/bin/python -m svgraph analyze examples/coverage.svg
          tmp/wheel-venv/bin/drawingml-svg-analyze examples/coverage.svg
          tmp/wheel-venv/bin/python - <<'PY'
          import svgraph
          from svgraph import svg_to_svgraph, svg_to_svgraph_presentation

          assert svgraph.svg_to_svgraph is svg_to_svgraph
          assert svgraph.svg_to_svgraph_presentation is svg_to_svgraph_presentation
          assert "svg_to_svgraph" in svgraph.__all__
          assert "svg_to_" + "ir" not in svgraph.__all__
          assert svg_to_svgraph("<svg><rect data-kind='table'/></svg>").kind == "svgraph"
          PY
          tmp/wheel-venv/bin/svgraph examples/svgraph.svg > tmp/wheel-svgraph.json
          tmp/wheel-venv/bin/drawingml-svg examples/svgraph.svg > tmp/wheel-legacy-svgraph.json
          tmp/wheel-venv/bin/svgraph svgraph-presentation examples/svgraph.svg > tmp/wheel-svgraph-presentation.json
          python - <<'PY'
          import json
          from pathlib import Path

          svgraph = json.loads(Path("tmp/wheel-svgraph.json").read_text(encoding="utf-8"))
          legacy_svgraph = json.loads(Path("tmp/wheel-legacy-svgraph.json").read_text(encoding="utf-8"))
          presentation = json.loads(Path("tmp/wheel-svgraph-presentation.json").read_text(encoding="utf-8"))
          assert svgraph["kind"] == "svgraph"
          assert legacy_svgraph["kind"] == "svgraph"
          assert legacy_svgraph["presentation"]["kind"] == "svgraph-presentation"
          assert svgraph["presentation"]["kind"] == "svgraph-presentation"
          assert presentation["kind"] == "svgraph-presentation"
          assert len(presentation["slides"]) == 2
          assert presentation["slide_size"] == [1280.0, 720.0]
          assert {part["kind"] for part in presentation["parts"]} >= {"presentation", "slide", "slide-master", "slide-layout", "theme"}
          part_types = {part["kind"]: part["content_type"] for part in presentation["parts"]}
          assert part_types["presentation"] == "application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"
          assert part_types["slide-master"] == "application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"
          assert part_types["slide-layout"] == "application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"
          assert part_types["theme"] == "application/vnd.openxmlformats-officedocument.theme+xml"
          assert any(
              part["kind"] == "slide"
              and part["content_type"] == "application/vnd.openxmlformats-officedocument.presentationml.slide+xml"
              for part in presentation["parts"]
          )
          PY
          tmp/wheel-venv/bin/svg2dml examples/sample.svg -o tmp/wheel-smoke.xml
          test -s tmp/wheel-smoke.xml
          tmp/wheel-venv/bin/svg2pptx examples/sample.svg -o tmp/wheel-smoke.pptx
          python -m zipfile --test tmp/wheel-smoke.pptx
          tmp/wheel-venv/bin/python - <<'PY'
          import io
          import zipfile

          from svgraph.pptx import svg_to_pptx_bytes

          svg = """<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
            <metadata>{"presentation":{"masters":[{"id":"brand"}],"layouts":[{"id":"title"}]}}</metadata>
            <g data-kind="slide-master"/>
            <g data-kind="slide-layout"/>
            <g data-kind="slide"><rect width="100" height="80"/></g>
            <g data-kind="slide"><ellipse cx="100" cy="80" rx="50" ry="30"/></g>
          </svg>"""
          with zipfile.ZipFile(io.BytesIO(svg_to_pptx_bytes(svg))) as pptx:
              assert pptx.testzip() is None
              names = set(pptx.namelist())
              assert "ppt/slideMasters/slideMaster2.xml" in names
              assert "ppt/slideLayouts/slideLayout2.xml" in names
              assert 'Target="../slideLayouts/slideLayout2.xml"' in pptx.read("ppt/slides/_rels/slide2.xml.rels").decode("utf-8")
          PY
