<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVGraph Editor</title>
    <meta name="description" content="Browser-only SVGraph editor for converting SVG presentation graphs into editable PresentationML and PPTX." />
    <link rel="canonical" href="https://com-junkawasaki.github.io/svgraph/" />
    <meta property="og:title" content="SVGraph Editor" />
    <meta property="og:description" content="Convert SVG presentation graphs to SVGraph, PresentationML, and PPTX entirely in the browser." />
    <meta property="og:url" content="https://com-junkawasaki.github.io/svgraph/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="SVGraph Editor" />
    <meta name="twitter:description" content="Browser-only SVG to SVGraph, PresentationML, and PPTX conversion." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='-apple-system,Arial' font-size='22' font-weight='700' fill='white'%3ESG%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "media",
        theme: {
          extend: {
            colors: { accent: { DEFAULT: "#0f766e", dark: "#2dd4bf" }, ink: "#1d1d1f" },
            fontFamily: {
              sans: ["-apple-system", "BlinkMacSystemFont", "SF Pro Text", "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", "sans-serif"],
              mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
            },
            boxShadow: { card: "0 1px 2px rgba(0,0,0,0.04), 0 12px 32px rgba(0,0,0,0.06)" },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body { @apply bg-[#fbfbfd] font-sans text-ink antialiased dark:bg-black dark:text-[#f5f5f7]; }
      }
      @layer components {
        .btn { @apply inline-flex min-h-[34px] items-center gap-1.5 rounded-full border border-black/10 bg-white/80 px-3.5 py-1.5 text-[13px] font-medium text-ink no-underline transition hover:bg-black/[0.03] active:scale-[0.97] disabled:opacity-40 dark:border-white/15 dark:bg-white/5 dark:text-white dark:hover:bg-white/10; }
        .btn.primary { @apply border-accent bg-accent text-white hover:brightness-95 dark:border-accent-dark dark:bg-accent-dark dark:text-black; }
        .pane { @apply flex min-h-0 min-w-0 flex-col overflow-hidden rounded-2xl border border-black/[0.07] bg-white/80 shadow-card backdrop-blur dark:border-white/[0.08] dark:bg-white/[0.04]; }
        .pane h2 { @apply m-0 border-b border-black/[0.06] px-4 py-2.5 text-[12px] font-semibold uppercase tracking-[0.05em] text-zinc-500 dark:border-white/[0.08] dark:text-zinc-400; }
        .tabs { @apply flex gap-1 border-b border-black/[0.06] p-2 dark:border-white/[0.08]; }
        .tab { @apply cursor-pointer rounded-full border-0 bg-transparent px-3 py-1.5 text-[13px] text-zinc-500 transition hover:bg-black/5 dark:text-zinc-400 dark:hover:bg-white/10; }
        .tab.active { @apply bg-accent/10 text-accent dark:bg-accent-dark/15 dark:text-accent-dark; }
        .panel-body { @apply min-h-0 overflow-auto p-3 text-[13px]; }
        textarea#source { @apply min-h-[360px] flex-1 resize-none border-0 bg-transparent p-3 font-mono text-[12px] leading-relaxed text-zinc-800 outline-none dark:text-zinc-200; }
        .preview { @apply grid flex-1 place-items-center overflow-auto p-3; background-image: linear-gradient(45deg,#eef1f5 25%,transparent 25%),linear-gradient(-45deg,#eef1f5 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#eef1f5 75%),linear-gradient(-45deg,transparent 75%,#eef1f5 75%); background-size: 22px 22px; background-position: 0 0,0 11px,11px -11px,-11px 0; }
        .preview svg { @apply max-h-full max-w-full border border-black/10 bg-white shadow-[0_8px_24px_rgba(16,24,40,0.12)]; }
        pre { @apply m-0 whitespace-pre-wrap break-words font-mono text-[12px] leading-relaxed text-zinc-800 dark:text-zinc-200; }
        .metrics { @apply mb-3 grid grid-cols-2 gap-2; }
        .metric { @apply rounded-xl border border-black/[0.06] bg-black/[0.02] p-2.5 dark:border-white/[0.08] dark:bg-white/[0.03]; }
        .metric strong { @apply block text-[20px] leading-tight; }
        .metric span { @apply text-[12px] text-zinc-500 dark:text-zinc-400; }
        .list { @apply grid gap-2; }
        .item { @apply rounded-xl border border-black/[0.06] bg-white/70 p-2.5 dark:border-white/[0.08] dark:bg-white/[0.04]; }
        .item-title { @apply mb-0.5 font-semibold; }
        .item-meta { @apply text-[12px] text-zinc-500 dark:text-zinc-400; }
        .notice { @apply mb-2.5 rounded-xl border border-sky-300/60 bg-sky-50 px-3 py-2.5 text-[13px] text-sky-800 dark:border-sky-400/30 dark:bg-sky-400/10 dark:text-sky-200; }
        .status { @apply flex items-center gap-2 text-[12px] text-zinc-500 dark:text-zinc-400; }
        .dot { @apply h-2 w-2 rounded-full bg-rose-500; }
        .dot.ok { @apply bg-accent dark:bg-accent-dark; }
        .panel-body table, .panel-body .table { @apply w-full border-collapse text-[12px]; }
        .panel-body th, .panel-body td { @apply border-b border-black/[0.06] px-2 py-1.5 text-left dark:border-white/[0.08]; }
      }
    </style>
  </head>
  <body>
    <div class="flex min-h-screen flex-col">
      <header class="sticky top-0 z-50 flex flex-wrap items-center justify-between gap-3 border-b border-black/[0.06] bg-[#fbfbfd]/80 px-4 py-2.5 backdrop-blur-xl dark:border-white/[0.08] dark:bg-black/70">
        <div class="flex min-w-[200px] items-center gap-2.5">
          <span class="grid h-8 w-8 place-items-center rounded-[9px] bg-accent text-[13px] font-bold text-white dark:bg-accent-dark dark:text-black">SG</span>
          <div class="leading-tight">
            <h1 class="m-0 text-[16px] font-semibold tracking-tight">SVGraph Editor</h1>
            <div class="text-[12px] text-zinc-500 dark:text-zinc-400">SVG → SVGraph · PresentationML · PPTX — all in the browser</div>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-1.5">
          <input id="fileInput" type="file" accept=".svg,.xml,.json,image/svg+xml,application/xml,text/xml,application/json" hidden />
          <button class="btn" id="openBtn" type="button">Open SVG/XML</button>
          <button class="btn" id="sampleBtn" type="button">Load Sample</button>
          <button class="btn" id="undoBtn" type="button" disabled>Undo</button>
          <button class="btn" id="redoBtn" type="button" disabled>Redo</button>
          <button class="btn" id="clearSavedBtn" type="button">Clear Saved</button>
          <span class="mx-1 hidden h-5 w-px bg-black/10 sm:block dark:bg-white/15"></span>
          <button class="btn" id="downloadSvgBtn" type="button">SVG</button>
          <button class="btn primary" id="downloadSVGraphBtn" type="button">SVGraph</button>
          <button class="btn" id="downloadSidecarBtn" type="button">Sidecar</button>
          <button class="btn" id="downloadDrawingMlBtn" type="button">DrawingML</button>
          <button class="btn" id="downloadPresentationBtn" type="button">Presentation</button>
          <button class="btn primary" id="downloadPptxBtn" type="button">PPTX</button>
          <span class="mx-1 hidden h-5 w-px bg-black/10 sm:block dark:bg-white/15"></span>
          <a class="btn" href="https://github.com/com-junkawasaki/svgraph">GitHub</a>
          <a class="btn" href="https://github.com/com-junkawasaki/svgraph/issues">Issues</a>
        </div>
      </header>

      <main class="grid min-h-0 flex-1 gap-3 p-3 lg:grid-cols-[minmax(300px,0.9fr)_minmax(380px,1.3fr)_minmax(320px,1fr)]">
        <section class="pane">
          <h2>SVG Source</h2>
          <textarea id="source" spellcheck="false"></textarea>
        </section>

        <section class="pane">
          <h2>Canvas</h2>
          <div class="preview" id="preview"></div>
        </section>

        <section class="pane">
          <h2>SVGraph</h2>
          <div class="tabs" role="tablist" aria-label="SVGraph views">
            <button class="tab active" data-tab="summary" type="button">Summary</button>
            <button class="tab" data-tab="slides" type="button">Slides</button>
            <button class="tab" data-tab="json" type="button">JSON</button>
            <button class="tab" data-tab="assistant" type="button">Assistant</button>
          </div>
          <div class="panel-body" id="panel"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
