<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVGraph Editor</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial' font-size='20' font-weight='700' fill='white'%3ESG%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #667085;
        --line: #d7dce3;
        --accent: #0f766e;
        --accent-2: #b42318;
        --soft: #e6f4f1;
        --code: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 220px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 6px;
        padding: 7px 10px;
        cursor: pointer;
        min-height: 34px;
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .btn:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: 2px solid #0ea5e9;
        outline-offset: 2px;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(300px, 0.9fr) minmax(380px, 1.3fr) minmax(320px, 1fr);
        gap: 12px;
        padding: 12px;
        min-height: 0;
      }

      .pane {
        min-width: 0;
        min-height: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
      }

      .pane h2 {
        margin: 0;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        text-transform: uppercase;
        color: var(--muted);
      }

      textarea {
        flex: 1;
        min-height: 360px;
        border: 0;
        resize: none;
        padding: 12px;
        color: var(--code);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .preview {
        flex: 1;
        min-height: 360px;
        padding: 12px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(45deg, #eef1f5 25%, transparent 25%),
          linear-gradient(-45deg, #eef1f5 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #eef1f5 75%),
          linear-gradient(-45deg, transparent 75%, #eef1f5 75%);
        background-size: 22px 22px;
        background-position:
          0 0,
          0 11px,
          11px -11px,
          -11px 0;
        overflow: auto;
      }

      .preview svg {
        max-width: 100%;
        max-height: 100%;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 8px 24px rgb(16 24 40 / 12%);
      }

      .tabs {
        display: flex;
        gap: 4px;
        padding: 8px;
        border-bottom: 1px solid var(--line);
      }

      .tab {
        border: 0;
        background: transparent;
        border-radius: 6px;
        padding: 7px 9px;
        color: var(--muted);
        cursor: pointer;
      }

      .tab.active {
        background: var(--soft);
        color: #134e4a;
      }

      .panel-body {
        min-height: 0;
        overflow: auto;
        padding: 12px;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: #fbfcfd;
      }

      .metric strong {
        display: block;
        font-size: 20px;
        line-height: 1.2;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--code);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-2);
      }

      .dot.ok {
        background: var(--accent);
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px;
        background: #fff;
      }

      .item-title {
        font-weight: 650;
        margin-bottom: 3px;
      }

      .item-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .notice {
        border: 1px solid #bae6fd;
        background: #f0f9ff;
        color: #075985;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
      }

      @media (max-width: 1100px) {
        .app {
          grid-template-columns: 1fr;
        }

        textarea,
        .preview {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <h1>SVGraph Editor</h1>
          <div class="subtitle">SVGraph semantic graph, slide/package preview, browser-local assistant hooks</div>
        </div>
        <div class="toolbar">
          <input id="fileInput" type="file" accept=".svg,image/svg+xml" hidden />
          <button class="btn" id="openBtn" type="button">Open SVG</button>
          <button class="btn" id="sampleBtn" type="button">Load Sample</button>
          <button class="btn primary" id="downloadSVGraphBtn" type="button">Download SVGraph</button>
          <button class="btn" id="downloadPresentationBtn" type="button">Download Presentation</button>
          <button class="btn primary" id="downloadPptxBtn" type="button">Download PPTX</button>
        </div>
      </header>

      <main class="app">
        <section class="pane">
          <h2>SVG Source</h2>
          <textarea id="source" spellcheck="false"></textarea>
        </section>

        <section class="pane">
          <h2>Canvas</h2>
          <div class="preview" id="preview"></div>
        </section>

        <section class="pane">
          <h2>SVGraph</h2>
          <div class="tabs" role="tablist" aria-label="SVGraph views">
            <button class="tab active" data-tab="summary" type="button">Summary</button>
            <button class="tab" data-tab="slides" type="button">Slides</button>
            <button class="tab" data-tab="json" type="button">JSON</button>
            <button class="tab" data-tab="assistant" type="button">Assistant</button>
          </div>
          <div class="panel-body" id="panel"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
