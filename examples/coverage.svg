<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-40 -30 400 240" width="800" height="480">
  <style>
    #board .panel { COLOR: #dcfce7; FILL: url(#panel); STROKE: hsl(143 65% 24%); STROKE-WIDTH: 3; }
    #board > rect.panel.featured { stroke-linejoin: miter; stroke-miterlimit: 6; }
    g.badges .badge { fill: currentColor; color: #f97316; stroke: hsla(0.349066rad, 75%, 28%, .7); stroke-width: 2; }
    text.title { fill: #111827; stroke: #ffffff; stroke-width: .75; font-size: 15pt !important; font-weight: 700; font-style: italic; font-family: 'Aptos Display', Arial, sans-serif; text-decoration: underline; text-anchor: middle; dominant-baseline: middle; }
    .route { fill: none; stroke: #0891b2; stroke-width: 1mm !important; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 2mm, 1mm; }
    rect[data-tone="cool"] { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; }
    rect[data-icon^="coverage"][data-icon$="probe"][data-tags~="signal"] { fill: #f0fdf4; stroke: #15803d; }
    rect[data-kind|="meter"] { stroke-width: 2; }
    rect.panel { stroke: #ef4444; }
    stop.panel-start { stop-color: currentcolor; stop-opacity: .95; }
    stop.panel-end { stop-color: rgb(187, 247, 208); stop-opacity: .6; }
    .hidden-probe { display: none; }
    @media only screen { rect[data-tone="cool"] { stroke-linecap: round; } }
    @media not print { rect[data-tone="cool"] { stroke-linejoin: bevel; } }
  </style>
  <defs>
    <linearGradient id="panel">
      <stop class="panel-start" offset="0%"/>
      <stop class="panel-end" offset="100%"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity=".6"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z"/>
    </marker>
    <symbol id="pin" viewBox="-10 -10 20 20">
      <circle cx="0" cy="0" r="8" fill="#ffffff" fill-opacity=".8" stroke="currentColor" stroke-width="2"/>
      <path d="M-4 0 Q0 -6 4 0 T-4 0" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <symbol id="context-badge" viewBox="0 0 20 10">
      <rect x="0" y="0" width="20" height="10" rx="2" fill="context-stroke" stroke="context-fill" stroke-width="2"/>
    </symbol>
    <clipPath id="badge-crop">
      <rect x="214" y="24" width="58" height="38"/>
    </clipPath>
    <clipPath id="object-crop" clipPathUnits=" OBJECTBOUNDINGBOX ">
      <rect x=".15" y=".2" width=".7" height=".55"/>
    </clipPath>
    <clipPath id="segment-crop">
      <rect x="104" y="92" width="20" height="20"/>
    </clipPath>
  </defs>
  <g id="board">
    <rect class="panel featured" x="-20" y="-10" width="360" height="180" rx="12"/>
    <rect class="hidden-probe" x="-40" y="-30" width="400" height="240"/>
    <path display=" NONE " d="M0 0 R10 20" filter="url(#hidden-filter)"/>
    <g visibility="hidden"><rect x="4" y="134" width="16" height="10" fill="#dcfce7" visibility="visible"/></g>
    <rect x="24" y="134" width="16" height="10" fill="#bfdbfe" style="transform: translate(4px, 0)"/>
    <rect x="44" y="134" width="12" height="10" fill="#e9d5ff" style="transform-origin: center; transform: rotate(10deg)"/>
    <text class="title" x="160" y="46">
      <tspan>Coverage</tspan>
      <tspan x="160" dy="24" text-transform="uppercase" fill="#dc2626" fill-opacity=".85" font-weight="700" font-style="italic" text-decoration-line="underline" baseline-shift="sub">fixture</tspan>
    </text>
    <text x="96" y="66" dx="4" dy="2" rotate="3" letter-spacing="2px" kerning="0" font-variant="small-caps" xml:space="preserve" font-size="9" fill="#334155">  spaced  </text>
    <text x="30" y="72" rotate=".25turn" font-size="6" fill="#0f172a">turn</text>
    <text font-size="7" fill="#0f172a"><tspan x="252" y="66" text-anchor="middle" dominant-baseline="middle">tspan anchor</tspan></text>
    <text x="302" y="134" text-transform=" NORMAL " font-size="7" fill="#0f172a">MiXeD</text>
    <text x="24" y="154" font-variant="all-small-caps" font-size="8" color="#0f172a" fill="currentColor" text-rendering="auto" text-decoration-line="underline" text-decoration-style="wavy" text-decoration-color="currentColor">caps mode</text>
    <text x="112" y="154" textLength="58" lengthAdjust=" SPACINGANDGLYPHS " letter-spacing=" NORMAL " font-size="8" fill="#0f172a">wide text</text>
    <text x="222" y="154" word-spacing="5" letter-spacing=" NORMAL " text-transform="uppercase" font-size="8" fill="#0f172a">word gap</text>
    <text x="302" y="154" text-anchor=" MIDDLE " dominant-baseline=" CENTRAL " font-size="7" fill="#0f172a">anchor</text>
    <text x="236" y="144" font-size="7" fill="#0f172a">run <tspan text-anchor="end" word-spacing="2">anchor gap</tspan></text>
    <text x="302" y="144" font-weight=" BOLD " font-style=" oblique 10deg " font-size="7" fill="#0f172a">style</text>
    <text x="302" y="126" font-family="'A,B Display', Arial, sans-serif" font-stretch="100.0%" baseline-shift="0%" font-size="6" fill="#0f172a">family</text>
    <text x="284" y="116" kerning="4" font-kerning="none" glyph-orientation-vertical="360deg" font-size="7" fill="#0f172a">A</text>
    <text x="170" y="66" baseline-shift="super" font-size="7" fill="#0f172a">sup</text>
    <text x="12" y="116" font-size="6" fill="#111827" stroke="#ffffff" stroke-width="1" transform="SCALE(1.5)">outline</text>
    <path class="route" d="M20 130 C80 70, 140 170, 210 110 S300 70, 320 132" marker-start="none" marker-mid="none" marker-end="url(#arrow)" stroke-dashoffset="3mm" fill-rule="evenodd" clip-rule="evenodd" clip-path="none" filter="none" mask="none" paint-order="fill stroke markers" shape-rendering="auto" vector-effect="none"/>
    <rect x="18" y="18" width="28" height="18" fill="#bbf7d0" stroke="#111827" stroke-width="0"/>
    <rect x="18" y="42" width="28" height="12" fill="#fef3c7" stroke="#111827" stroke-width="2" paint-order="markers fill stroke"/>
    <rect x="52" y="18" width="28" height="18" fill="#111827" fill-opacity="0" stroke="#111827" stroke-opacity="0" stroke-width="2" mix-blend-mode="multiply"/>
    <rect x="86" y="18" width="12" height="18"/>
    <line x1="104" y1="18" x2="132" y2="36" fill="initial"/>
    <line x1="104" y1="42" x2="132" y2="42" stroke="#111827" marker="url(#arrow)"/>
    <line x1="104" y1="48" x2="132" y2="48" stroke="#111827" stroke-dasharray="0 0"/>
    <line x1="104" y1="54" x2="132" y2="54" stroke="#111827" stroke-dasharray="-1 2"/>
    <line x1="104" y1="60" x2="132" y2="60" stroke="#111827" stroke-width="2" stroke-dasharray="calc(4px + 4px), max(3px, 4px)" stroke-dashoffset="calc(1px + 1px)"/>
    <line x1="104" y1="66" x2="132" y2="66" stroke="#111827" stroke-width="2%"/>
    <line x1="104" y1="72" x2="132" y2="72" stroke="#111827" stroke-width="2" stroke-dasharray="8% 4%" stroke-dashoffset="2%"/>
    <line x1="104" y1="78" x2="132" y2="78" stroke="#111827" stroke-width="2" stroke-dasharray="8 4" stroke-dashoffset="10"/>
    <path d="M142 18 H166 V34 H142 Z" fill="#e0f2fe" stroke="none" stroke-dasharray="4 2" pathLength="100"/>
    <polyline points="104,84 118,84 132,92" fill="none" stroke="#111827" stroke-width="2" stroke-linecap=" ROUND " stroke-linejoin=" miter-clip "/>
    <polyline points="96,84 140,128" fill="none" stroke="#0f766e" stroke-width="2" clip-path="url(#segment-crop)"/>
    <path d="M96 120 L132 84" fill="none" stroke="#7c3aed" stroke-width="2" clip-path="url(#segment-crop)"/>
    <path d="M140 42 L166 42" pathLength="100" fill="none" stroke="#111827"/>
    <a href="https://example.test/coverage"><rect data-tone="cool" x="140" y="18" width="26" height="18"/></a>
    <rect data-icon="coverage-probe" data-tags="warm signal" data-kind="meter-high" x="172" y="18" width="24" height="18"/>
    <rect x="78%" y="8%" width="8%" height="12%" fill="#e0f2fe" stroke="#0369a1"/>
    <circle cx="316" cy="36" r="8" fill="url(#missingPaint) #dc2626"/>
    <circle cx="292" cy="18" r="7" fill="url(#halo)"/>
    <polygon points="40,54 66,42 92,54 82,86 50,86" fill="#f008" stroke="#991b1b" stroke-width="2"/>
    <polyline points="1.10e2,86 1.38e2,56 1.66e2,86 1.94e2,56" fill="none" stroke="#4338ca" stroke-width="3" stroke-linejoin="miter" stroke-miterlimit="0"/>
    <g class="badges" transform="TRANSLATE(232 42) ROTATE(12)">
      <ellipse class="badge" cx="0" cy="0" rx="34" ry="20"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#7c2d12" stroke-width="2"/>
      <line x1="-18" y1="-8" x2="18" y2="8" stroke="#0f766e" stroke-width="2"/>
    </g>
    <rect x="204" y="18" width="82" height="54" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2" clip-path="url(#badge-crop)"/>
    <rect x="116" y="104" width="98" height="44" rx="6" fill="#ede9fe" stroke="#6d28d9" stroke-width="2" clip-path="url(#object-crop)"/>
    <a fill="#fef9c3" stroke="#a16207">
      <rect x="222" y="84" width="48" height="20" rx="4" fill="inherit" stroke="inherit"/>
    </a>
    <switch>
      <rect requiredExtensions="https://example.test/ext" x="288" y="84" width="34" height="20" fill="#123abc"/>
      <rect x="288" y="84" width="34" height="20" rx="4" fill="#ecfccb" stroke="#4d7c0f"/>
    </switch>
    <svg x="224" y="116" width="64" height="36" viewBox="0 0 32 18" preserveAspectRatio=" NONE ">
      <rect x="0" y="0" width="32" height="18" rx="3" fill="#ccfbf1" stroke="#0f766e" stroke-width="1"/>
      <circle cx="75%" cy="50%" r="12%" fill="#0f766e"/>
    </svg>
    <svg x="296" y="116" width="32" height="36" viewBox="0 0 16 8" preserveAspectRatio=" XMAXYMAX SLICE ">
      <rect x="0" y="0" width="16" height="8" rx="2" fill="#fee2e2" stroke="#991b1b" stroke-width="1"/>
    </svg>
    <image xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/luzQnAAAAABJRU5ErkJggg==" x="286" y="36" width="28" height="28" opacity=".65" clip-path="url(#object-crop)"/>
    <image xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/luzQnAAAAABJRU5ErkJggg==" x="318" y="126" width="16" height="16" transform="translate(0 284) scale(1 -1)"/>
    <use xlink:href="#context-badge" x="278" y="104" width="40" height="20" fill="#fef9c3" stroke="#a16207"/>
    <use xlink:href="#pin" x="276" y="78" width="40" height="40" color="#2563eb"/>
  </g>
</svg>
