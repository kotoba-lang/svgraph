<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -30 400 240" width="800" height="480">
  <style>
    #board .panel { color: #dcfce7; fill: url(#panel); stroke: hsl(143 65% 24%); stroke-width: 3; }
    #board > rect.panel.featured { stroke-linejoin: miter; stroke-miterlimit: 6; }
    g.badges .badge { fill: currentColor; color: #f97316; stroke: hsla(0.349066rad, 75%, 28%, .7); stroke-width: 2; }
    text.title { fill: #111827; stroke: #ffffff; stroke-width: .75; font-size: 15pt !important; font-weight: 700; font-style: italic; font-family: 'Aptos Display', Arial, sans-serif; text-decoration: underline; text-anchor: middle; dominant-baseline: middle; }
    .route { fill: none; stroke: #0891b2; stroke-width: 1mm !important; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 2mm, 1mm; }
    rect[data-tone="cool"] { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; }
    rect[data-icon^="coverage"][data-icon$="probe"][data-tags~="signal"] { fill: #f0fdf4; stroke: #15803d; }
    rect[data-kind|="meter"] { stroke-width: 2; }
    rect.panel { stroke: #ef4444; }
    stop.panel-start { stop-color: currentColor; stop-opacity: .95; }
    stop.panel-end { stop-color: rgb(187, 247, 208); stop-opacity: .6; }
    .hidden-probe { display: none; }
  </style>
  <defs>
    <linearGradient id="panel">
      <stop class="panel-start" offset="0%"/>
      <stop class="panel-end" offset="100%"/>
    </linearGradient>
    <radialGradient id="halo">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity=".6"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z"/>
    </marker>
    <symbol id="pin" viewBox="-10 -10 20 20">
      <circle cx="0" cy="0" r="8" fill="#ffffff" fill-opacity=".8" stroke="currentColor" stroke-width="2"/>
      <path d="M-4 0 Q0 -6 4 0 T-4 0" fill="none" stroke="currentColor" stroke-width="2"/>
    </symbol>
    <clipPath id="badge-crop">
      <rect x="214" y="24" width="58" height="38"/>
    </clipPath>
    <clipPath id="object-crop" clipPathUnits="objectBoundingBox">
      <rect x=".15" y=".2" width=".7" height=".55"/>
    </clipPath>
  </defs>
  <g id="board">
    <rect class="panel featured" x="-20" y="-10" width="360" height="180" rx="12"/>
    <rect class="hidden-probe" x="-40" y="-30" width="400" height="240"/>
    <text class="title" x="160" y="46">
      <tspan>Coverage</tspan>
      <tspan x="160" dy="24">fixture</tspan>
    </text>
    <text x="96" y="66" dx="4" dy="2" rotate="3" letter-spacing="2px" font-variant="small-caps" xml:space="preserve" font-size="9" fill="#334155">  spaced  </text>
    <path class="route" d="M20 130 C80 70, 140 170, 210 110 S300 70, 320 132" marker-end="url(#arrow)"/>
    <rect x="18" y="18" width="28" height="18" fill="#bbf7d0" stroke="#111827" stroke-width="0"/>
    <rect x="52" y="18" width="28" height="18" fill="#111827" fill-opacity="0" stroke="#111827" stroke-opacity="0" stroke-width="2"/>
    <rect x="86" y="18" width="12" height="18"/>
    <line x1="104" y1="18" x2="132" y2="36"/>
    <line x1="104" y1="42" x2="132" y2="42" stroke="#111827"/>
    <rect data-tone="cool" x="140" y="18" width="26" height="18"/>
    <rect data-icon="coverage-probe" data-tags="warm signal" data-kind="meter-high" x="172" y="18" width="24" height="18"/>
    <rect x="78%" y="8%" width="8%" height="12%" fill="#e0f2fe" stroke="#0369a1"/>
    <circle cx="316" cy="36" r="8" fill="url(#missingPaint) #dc2626"/>
    <circle cx="292" cy="18" r="7" fill="url(#halo)"/>
    <polygon points="40,54 66,42 92,54 82,86 50,86" fill="#f008" stroke="#991b1b" stroke-width="2"/>
    <polyline points="1.10e2,86 1.38e2,56 1.66e2,86 1.94e2,56" fill="none" stroke="#4338ca" stroke-width="3"/>
    <g class="badges" transform="translate(232 42) rotate(12)">
      <ellipse class="badge" cx="0" cy="0" rx="34" ry="20"/>
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#7c2d12" stroke-width="2"/>
      <line x1="-18" y1="-8" x2="18" y2="8" stroke="#0f766e" stroke-width="2"/>
    </g>
    <rect x="204" y="18" width="82" height="54" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2" clip-path="url(#badge-crop)"/>
    <rect x="116" y="104" width="98" height="44" rx="6" fill="#ede9fe" stroke="#6d28d9" stroke-width="2" clip-path="url(#object-crop)"/>
    <a fill="#fef9c3" stroke="#a16207">
      <rect x="222" y="84" width="48" height="20" rx="4"/>
    </a>
    <switch>
      <rect requiredExtensions="https://example.test/ext" x="288" y="84" width="34" height="20" fill="#123abc"/>
      <rect x="288" y="84" width="34" height="20" rx="4" fill="#ecfccb" stroke="#4d7c0f"/>
    </switch>
    <svg x="224" y="116" width="64" height="36" viewBox="0 0 32 18" preserveAspectRatio="none">
      <rect x="0" y="0" width="32" height="18" rx="3" fill="#ccfbf1" stroke="#0f766e" stroke-width="1"/>
      <circle cx="75%" cy="50%" r="12%" fill="#0f766e"/>
    </svg>
    <image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/luzQnAAAAABJRU5ErkJggg==" x="286" y="36" width="28" height="28"/>
    <use href="#pin" x="276" y="78" width="40" height="40" color="#2563eb"/>
  </g>
</svg>
